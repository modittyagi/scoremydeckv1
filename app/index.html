<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ScoreMyDeck — Get Your Fundability Score</title>
<meta name="description" content="AI that evaluates your startup like a real VC. Get a score out of 100 and see exactly why investors will say no." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0e0f11;
    --bg2:      #13151a;
    --bg3:      #1a1c23;
    --border:   rgba(255,255,255,0.07);
    --text:     #f0f0ef;
    --muted:    #7a7d85;
    --muted2:   #555860;
    --accent:   #63d2a3;
    --red:      #f05c5c;
    --orange:   #f0954a;
    --yellow:   #f0c84a;
    --green:    #63d2a3;
    --font-display: 'Bricolage Grotesque', sans-serif;
    --font-body:    'Inter', sans-serif;
    --font-mono:    'DM Mono', monospace;
    --radius:   12px;
    --radius-lg: 18px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
    overflow-x: hidden;
  }

  /* noise texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.5;
  }

  /* ── LAYOUT ── */
  .wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 560px;
    margin: 0 auto;
    padding: 24px 18px 48px;
  }
  @media (min-width: 480px) { .wrap { padding: 32px 24px 64px; } }

  /* ── NAV ── */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px;
  }
  .nav-logo {
    font-family: var(--font-display); font-size: 16px; font-weight: 800;
    color: #fff; text-decoration: none; letter-spacing: -0.01em;
  }
  .nav-logo span { color: var(--accent); }
  .nav-back {
    font-size: 13px; color: var(--muted); text-decoration: none;
    display: flex; align-items: center; gap: 5px;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--text); }

  /* ── PAGE HEADER ── */
  .page-header { margin-bottom: 28px; }
  .page-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(99,210,163,0.08); border: 1px solid rgba(99,210,163,0.18);
    border-radius: 100px; padding: 4px 12px;
    font-size: 11.5px; font-weight: 500; color: var(--accent);
    letter-spacing: 0.03em; margin-bottom: 12px;
  }
  .badge-dot {
    width: 5px; height: 5px; background: var(--accent); border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.4; transform:scale(.65); }
  }
  .page-title {
    font-family: var(--font-display);
    font-size: clamp(24px, 7vw, 36px);
    font-weight: 800; line-height: 1.1; letter-spacing: -0.025em;
    color: #fff; margin-bottom: 8px;
  }
  .page-title em { font-style: normal; color: var(--accent); }
  .page-sub { font-size: 14px; color: var(--muted); line-height: 1.55; }

  /* ── FORM CARD ── */
  .form-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    position: relative; overflow: hidden;
    margin-bottom: 16px;
  }
  .form-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(99,210,163,0.35), transparent);
  }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }

  label {
    font-size: 12px; font-weight: 600; color: var(--muted);
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .optional {
    font-size: 10.5px; font-weight: 400; color: var(--muted2);
    text-transform: none; letter-spacing: 0; margin-left: 4px;
  }

  input[type="text"], textarea {
    width: 100%;
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 14px;
    font-family: var(--font-body);
    font-size: 16px; /* prevents iOS zoom */
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none; appearance: none;
    resize: none;
  }
  input::placeholder, textarea::placeholder { color: var(--muted2); font-size: 14px; }
  input:focus, textarea:focus {
    border-color: rgba(99,210,163,0.4);
    box-shadow: 0 0 0 3px rgba(99,210,163,0.07);
  }
  textarea { min-height: 88px; line-height: 1.55; }

  /* ── SUBMIT BUTTON ── */
  .btn-score {
    width: 100%; min-height: 52px;
    background: var(--accent); color: #0a1a12;
    border: none; border-radius: var(--radius);
    font-family: var(--font-display);
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.01em;
    cursor: pointer; position: relative; overflow: hidden;
    transition: background 0.2s, transform 0.12s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-score::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(255,255,255,0.12), transparent);
    pointer-events: none;
  }
  .btn-score:hover:not(:disabled) {
    background: #7fffc0;
    box-shadow: 0 0 0 3px rgba(99,210,163,0.2), 0 0 36px rgba(99,210,163,0.4);
  }
  .btn-score:active:not(:disabled) { transform: scale(0.97); }
  .btn-score:disabled {
    background: rgba(99,210,163,0.35);
    cursor: not-allowed; transform: none;
  }

  /* spinner */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(10,26,18,0.3);
    border-top-color: #0a1a12;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-score.loading .spinner { display: block; }

  /* ── ERROR ── */
  .error-box {
    display: none;
    background: rgba(240,92,92,0.07);
    border: 1px solid rgba(240,92,92,0.2);
    border-radius: var(--radius); padding: 13px 14px;
    font-size: 13px; color: #f08080; line-height: 1.5;
    margin-bottom: 16px;
  }
  .error-box.visible { display: block; }

  /* ── RESULTS ── */
  #results { display: none; }
  #results.visible { display: block; }

  /* score hero */
  .score-hero {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px 20px;
    text-align: center;
    margin-bottom: 12px;
    position: relative; overflow: hidden;
  }
  .score-hero::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(99,210,163,0.5), transparent);
  }
  .score-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted); margin-bottom: 12px;
  }
  .score-big {
    font-family: var(--font-mono);
    font-size: clamp(64px, 18vw, 88px);
    font-weight: 500; line-height: 1;
    color: #fff; margin-bottom: 4px;
  }
  .score-big span { font-size: 0.38em; color: var(--muted); font-weight: 400; }
  .score-verdict {
    font-size: 13px; color: var(--muted); line-height: 1.5; margin-top: 8px;
    max-width: 280px; margin-left: auto; margin-right: auto;
  }
  .score-verdict strong { font-weight: 600; }

  /* score ring color bands */
  .score-big.score-red   { color: var(--red);    }
  .score-big.score-orange{ color: var(--orange);  }
  .score-big.score-yellow{ color: var(--yellow);  }
  .score-big.score-green { color: var(--accent);  }

  /* breakdown */
  .section-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 10.5px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.09em; color: var(--muted); margin-bottom: 14px;
  }

  .breakdown-list { display: flex; flex-direction: column; gap: 12px; }
  .breakdown-item { display: flex; flex-direction: column; gap: 6px; }
  .breakdown-header {
    display: flex; justify-content: space-between; align-items: center;
  }
  .breakdown-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .breakdown-score {
    font-family: var(--font-mono); font-size: 12px; font-weight: 500;
    color: var(--muted);
  }
  .bar-track {
    height: 4px; background: rgba(255,255,255,0.06);
    border-radius: 99px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; border-radius: 99px;
    transform-origin: left; transform: scaleX(0);
    transition: transform 1s cubic-bezier(0.22,1,0.36,1);
  }
  .bar-fill.animated { transform: scaleX(1); }
  .bar-fill.c-red    { background: var(--red);    box-shadow: 0 0 6px rgba(240,92,92,0.3);    }
  .bar-fill.c-orange { background: var(--orange); box-shadow: 0 0 6px rgba(240,149,74,0.25);  }
  .bar-fill.c-yellow { background: var(--yellow); box-shadow: 0 0 6px rgba(240,200,74,0.25);  }
  .bar-fill.c-green  { background: var(--green);  box-shadow: 0 0 6px rgba(99,210,163,0.3);   }

  .breakdown-note {
    font-size: 12px; color: var(--muted); line-height: 1.5;
    padding: 8px 10px;
    background: rgba(255,255,255,0.03);
    border-left: 2px solid rgba(255,255,255,0.08);
    border-radius: 0 6px 6px 0;
    margin-top: 2px;
  }

  .verdict-strip {
    margin-top: 12px; padding: 10px 13px;
    background: rgba(240,92,92,0.06);
    border: 1px solid rgba(240,92,92,0.15);
    border-radius: var(--radius);
    font-size: 13px; color: #e8a0a0; line-height: 1.5;
    font-style: italic;
  }

  .feedback-severity {
    font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--muted2);
    margin-bottom: 3px; display: block;
  }
  .sev-1 .feedback-severity { color: var(--red); }
  .sev-2 .feedback-severity { color: var(--orange); }
  .sev-3 .feedback-severity { color: var(--yellow); }
  .sev-4 .feedback-severity { color: var(--muted); }
  .sev-5 .feedback-severity { color: var(--muted2); }

  /* feedback */
  .feedback-list { display: flex; flex-direction: column; gap: 10px; }
  .feedback-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 12px 13px;
    background: rgba(240,92,92,0.04);
    border: 1px solid rgba(240,92,92,0.12);
    border-radius: var(--radius);
  }
  .feedback-num {
    font-family: var(--font-mono); font-size: 10px; font-weight: 500;
    color: var(--red); background: rgba(240,92,92,0.1);
    border: 1px solid rgba(240,92,92,0.2);
    border-radius: 5px; padding: 2px 6px;
    flex-shrink: 0; margin-top: 1px; white-space: nowrap;
  }
  .feedback-text { font-size: 13.5px; color: #d8d8d5; line-height: 1.55; }

  /* retry */
  .btn-retry {
    width: 100%; min-height: 48px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--font-body); font-size: 14px; font-weight: 500;
    color: var(--muted); cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-top: 12px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-retry:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

  /* ── FADE IN ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: none; }
  }
  .fade-in { animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both; }
  .fade-in-1 { animation-delay: 0.05s; }
  .fade-in-2 { animation-delay: 0.12s; }
  .fade-in-3 { animation-delay: 0.19s; }
  .fade-in-4 { animation-delay: 0.26s; }
</style>
</head>
<body>
<div class="wrap">

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">Score<span>MyDeck</span></a>
    <a href="index.html" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M8.5 3L5 7l3.5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-badge"><span class="badge-dot"></span>Free Analysis</div>
    <h1 class="page-title">Get your<br><em>Fundability Score</em></h1>
    <p class="page-sub">Fill in the details below. AI will score your startup like a VC would — brutal, specific, and actionable.</p>
  </div>

  <!-- ERROR BOX -->
  <div class="error-box" id="errorBox"></div>

  <!-- FORM -->
  <div id="formSection">
    <div class="form-card">

      <div class="field">
        <label for="startupName">Startup Name</label>
        <input type="text" id="startupName" placeholder="e.g. ScoreMyDeck" autocomplete="off" />
      </div>

      <div class="field">
        <label for="desc">What does it do?</label>
        <textarea id="desc" placeholder="Describe your product, the problem it solves, and how it works. Be specific." rows="4"></textarea>
      </div>

      <div class="field">
        <label for="market">Target Customer</label>
        <input type="text" id="market" placeholder="e.g. Early-stage SaaS founders raising seed rounds" />
      </div>

      <div class="field">
        <label for="traction">Traction <span class="optional">optional</span></label>
        <textarea id="traction" placeholder="Users, revenue, waitlist, pilots, growth rate — anything real." rows="3"></textarea>
      </div>

    </div>

    <button class="btn-score" id="scoreBtn" onclick="getScore()">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">Get My Fundability Score</span>
    </button>
  </div>

  <!-- RESULTS -->
  <div id="results">

    <!-- Score Hero -->
    <div class="score-hero fade-in fade-in-1">
      <div class="score-label">Fundability Score</div>
      <div class="score-big" id="scoreBig">—</div>
      <div class="score-verdict" id="scoreVerdict"></div>
    </div>

    <!-- Breakdown -->
    <div class="section-card fade-in fade-in-2">
      <div class="section-title">Score Breakdown</div>
      <div class="breakdown-list" id="breakdownList"></div>
    </div>

    <!-- Feedback -->
    <div class="section-card fade-in fade-in-3">
      <div class="section-title">Why a VC would pass</div>
      <div class="feedback-list" id="feedbackList"></div>
    </div>

    <button class="btn-retry fade-in fade-in-4" onclick="resetForm()">Score a different startup</button>
  </div>

</div>

<script>
async function getScore() {
  const name    = document.getElementById('startupName').value.trim();
  const desc    = document.getElementById('desc').value.trim();
  const market  = document.getElementById('market').value.trim();
  const traction= document.getElementById('traction').value.trim();
  const btn     = document.getElementById('scoreBtn');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('spinner');
  const errorBox= document.getElementById('errorBox');

  // clear error
  errorBox.textContent = '';
  errorBox.classList.remove('visible');

  // validate
  if (!name) return showError('Enter your startup name.');
  if (!desc)  return showError('Describe what your startup does.');
  if (!market) return showError('Enter your target customer.');

  // loading
  btn.disabled = true;
  btn.classList.add('loading');
  btnText.textContent = 'Analyzing...';
  spinner.style.display = 'block';

  try {
    const res = await fetch('/api/score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, desc, market, traction })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Server error. Try again.');
    }

    const data = await res.json();
    renderResults(data);

  } catch (err) {
    showError(err.message || 'Something went wrong. Try again.');
    btn.disabled = false;
    btn.classList.remove('loading');
    btnText.textContent = 'Get My Fundability Score';
    spinner.style.display = 'none';
  }
}

function renderResults(data) {
  document.getElementById('formSection').style.display = 'none';

  const score = data.score;
  const scoreBig = document.getElementById('scoreBig');
  scoreBig.innerHTML = score + '<span>/100</span>';
  if (score < 30)      scoreBig.className = 'score-big score-red';
  else if (score < 50) scoreBig.className = 'score-big score-orange';
  else if (score < 70) scoreBig.className = 'score-big score-yellow';
  else                 scoreBig.className = 'score-big score-green';

  // verdict — use AI verdict, else fallback
  const verdictText = data.verdict || (
    score < 30  ? 'Would not pass first screen. Structural problems across the board.' :
    score < 50  ? 'Would not proceed. Fundamental gaps need answers before this is investable.' :
    score < 70  ? 'Would pass on current form. Worth revisiting in 6 months with traction.' :
    score < 85  ? 'Fundable with the right investor. A few sharp risks to address first.' :
                  'Strong signal. Would move to partner meeting.'
  );
  document.getElementById('scoreVerdict').innerHTML =
    `<strong>${data.startupName}</strong><div class="verdict-strip">${verdictText}</div>`;

  // breakdown
  const breakdownList = document.getElementById('breakdownList');
  breakdownList.innerHTML = '';
  const cats = [
    { key: 'market',   label: 'Market Size' },
    { key: 'traction', label: 'Traction' },
    { key: 'problem',  label: 'Problem Clarity' },
    { key: 'model',    label: 'Business Model' },
  ];
  cats.forEach((cat) => {
    const raw  = data.breakdown[cat.key];
    const val  = (raw && typeof raw === 'object') ? (raw.score || 0) : (raw || 0);
    const note = (raw && typeof raw === 'object') ? (raw.note  || '') : '';
    let colorClass = 'c-red';
    if (val >= 70) colorClass = 'c-green';
    else if (val >= 50) colorClass = 'c-yellow';
    else if (val >= 30) colorClass = 'c-orange';
    const item = document.createElement('div');
    item.className = 'breakdown-item';
    item.innerHTML =
      `<div class="breakdown-header">
        <span class="breakdown-name">${cat.label}</span>
        <span class="breakdown-score">${val}/100</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill ${colorClass}" style="width:${val}%"></div>
      </div>` +
      (note ? `<div class="breakdown-note">${note}</div>` : '');
    breakdownList.appendChild(item);
  });

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.bar-fill').forEach((b, i) => {
        setTimeout(() => b.classList.add('animated'), i * 100);
      });
    });
  });

  // feedback with severity labels
  const severityLabels = ['DEAL-BREAKER', 'MAJOR RISK', 'SIGNIFICANT CONCERN', 'REAL ISSUE', 'WORTH FIXING'];
  const feedbackList = document.getElementById('feedbackList');
  feedbackList.innerHTML = '';
  (data.feedback || []).forEach((point, i) => {
    const cleanPoint = point.replace(/^(DEAL-BREAKER|MAJOR RISK|SIGNIFICANT CONCERN|REAL ISSUE|WORTH FIXING)\s*:\s*/i, '');
    const item = document.createElement('div');
    item.className = `feedback-item sev-${i + 1}`;
    item.innerHTML =
      `<span class="feedback-num">0${i + 1}</span>` +
      `<div><span class="feedback-severity">${severityLabels[i] || ''}</span>` +
      `<span class="feedback-text">${cleanPoint}</span></div>`;
    feedbackList.appendChild(item);
  });

  document.getElementById('results').classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
  document.getElementById('results').classList.remove('visible');
  document.getElementById('formSection').style.display = 'block';
  const btn     = document.getElementById('scoreBtn');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('spinner');
  btn.disabled  = false;
  btn.classList.remove('loading');
  btnText.textContent = 'Get My Fundability Score';
  spinner.style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('visible');
  box.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// enter key on inputs
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.tagName === 'INPUT') getScore();
});
</script>
</body>
</html>
